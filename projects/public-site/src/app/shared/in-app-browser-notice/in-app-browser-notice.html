@if (visible()) {
  <div class="iab-banner">
    <span class="iab-text">
      You're viewing this in an in-app browser (e.g. LINE) — Google/Facebook sign-in may not
      work here. Tap "•••" and choose "Open in Browser" to continue normally.
    </span>
    <button type="button" class="iab-close" (click)="dismiss()" aria-label="Dismiss">×</button>
  </div>
}
