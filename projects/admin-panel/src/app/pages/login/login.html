<div class="login-shell">
  <div class="login-brand">
    <div class="brand-mark">◈</div>
    <div class="brand-text">
      <span class="brand-name">Willpower Institute</span>
      <span class="brand-name-th">สถาบันพลังจิตตานุภาพ</span>
    </div>
    <p class="brand-tagline">Admin Console</p>
  </div>

  <div class="login-card card">
    <h1 class="login-title">Sign in</h1>
    <p class="login-subtitle">Enter your credentials to access the admin panel.</p>

    @if (error()) {
      <div class="login-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <label class="field-label" for="email">Email</label>
      <input
        id="email"
        type="email"
        class="form-input login-input"
        placeholder="your@email.com"
        autocomplete="username"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
      />

      <label class="field-label" for="password">Password</label>
      <div class="password-wrap">
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          class="form-input login-input"
          placeholder="••••••••"
          autocomplete="current-password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
        />
        <button type="button" class="password-toggle" (click)="showPassword.set(!showPassword())">
          {{ showPassword() ? 'Hide' : 'Show' }}
        </button>
      </div>

      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" [ngModel]="rememberMe()" (ngModelChange)="rememberMe.set($event)" name="rememberMe" />
          Keep me signed in
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <app-turnstile-widget (tokenChange)="onTurnstileToken($event)"></app-turnstile-widget>

      <button type="submit" class="btn btn-solid login-submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>

  <app-sso-buttons (success)="onSsoSuccess()" (failure)="onSsoFailure($event)"></app-sso-buttons>
</div>
