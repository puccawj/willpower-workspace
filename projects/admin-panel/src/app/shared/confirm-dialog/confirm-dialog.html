@if (confirm.request(); as req) {
  <div class="confirm-overlay" (click)="respond(false)">
    <div class="confirm-card" (click)="$event.stopPropagation()">
      <h3 class="confirm-title">{{ req.title }}</h3>
      <p class="confirm-message">{{ req.message }}</p>
      <div class="confirm-actions">
        <button type="button" class="cancel-btn" (click)="respond(false)">Cancel</button>
        <button type="button" class="btn" [class.btn-solid]="!req.danger" [class.btn-danger]="req.danger" (click)="respond(true)">
          {{ req.confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
